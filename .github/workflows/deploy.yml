name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Не запускать два деплоя одновременно
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify start (Telegram)
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d message_thread_id="${{ secrets.TELEGRAM_THREAD_ID }}" \
            -d parse_mode=HTML \
            --data-urlencode "text=🚀 <b>Деплой начат</b> — ${{ github.repository }} (${{ github.ref_name }}) · коммит <code>${{ github.sha }}</code> · автор ${{ github.actor }}"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Sync code to VM (rsync, .env сохраняется)
        run: |
          rsync -az \
            --exclude '.git' --exclude '.env' --exclude 'node_modules' \
            --exclude '__pycache__' --exclude '*.pyc' --exclude '.venv' \
            --exclude 'apps/backend/storage/' --exclude 'apps/frontend/dist/' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new" \
            ./ "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/opt/facefit/"

      - name: Build & restart on VM
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" 'bash -s' <<'EOF'
          set -e
          cd /opt/facefit
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.tunnel.yml up -d --build \
            backend worker_analysis worker_report worker_after_photo worker_telegram
          sleep 12
          curl -fsS http://localhost:8000/health
          EOF

      - name: Notify success (Telegram)
        if: success()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d message_thread_id="${{ secrets.TELEGRAM_THREAD_ID }}" \
            -d parse_mode=HTML \
            --data-urlencode "text=✅ <b>Деплой завершён</b> — коммит <code>${{ github.sha }}</code> выкачен и запущен, /health отвечает."

      - name: Notify failure (Telegram)
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d message_thread_id="${{ secrets.TELEGRAM_THREAD_ID }}" \
            -d parse_mode=HTML \
            --data-urlencode "text=❌ <b>Деплой упал</b> — коммит <code>${{ github.sha }}</code>. Логи: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
